server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: myblog
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

#redis配置
  data:
    redis:
      host: localhost
      password: 123456
      database: 0
#    redis:
#      port: 6379
#      password: 123456
#      database: 0
#    timeout: 3000ms
#    lettuce:
#      pool:
#        max-active: 8
#        max-idle: 8
#        min-idle: 0

#  servlet:
#    multipart:
#      max-file-size: 10MB
#      max-request-size: 100MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.yanghub.myblog
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 日志配置
logging:
  level:
    com.blog: DEBUG
    org.springframework.security: DEBUG
